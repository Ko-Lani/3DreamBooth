name: 3dapter_default
stage: train
method: 3dapter

environment:
  CUDA_VISIBLE_DEVICES: "0"

runtime:
  nproc_per_node: 1
  master_port: 8002

args:
  sp_size: 1
  pretrained_model_root: ./checkpoints/hunyuanvideo-1.5
  pretrained_transformer_version: 720p_t2v
  output_dir: ./outputs/3dapter/pretraining
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  learning_rate: 1.0e-4
  batch_size: 4
  gradient_accumulation_steps: 8
  max_steps: 200000
  save_interval: 5000
  validation_interval: 500
  validate_video_length: 49
  use_prodigy: true
  use_muon: false
  use_subjects200k: true
  subjects200k_collection: collection_2
  subjects200k_min_quality: 5
  subjects200k_cache_dir: ./.cache/huggingface
  validation_prompts:
    - ./data/my_subject/references/001.png::A cinematic video of it in a sunlit forest.
